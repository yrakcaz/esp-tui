name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  host:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Build
        run: cargo build --verbose

      - name: Run Rustfmt
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --workspace

      - name: Run Tests
        run: RUST_BACKTRACE=1 cargo test --all-targets --workspace --verbose

  cross:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev binutils

      - name: Install Xtensa toolchain
        run: cargo install espup && espup install

      - name: Add RISC-V bare-metal targets
        run: rustup target add riscv32imc-unknown-none-elf riscv32imac-unknown-none-elf

      - name: Install LLVM tools
        run: rustup component add llvm-tools-preview

      - name: Build agent for all targets
        run: cargo xtask build-agent
